<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homeslice</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root {
    --bg: #111;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #0f3460;
    --text: #e0e0e0;
    --muted: #888;
    --green: #53d769;
    --blue: #4fc3f7;
    --gh: #333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .container { max-width: 900px; margin: 0 auto; }
  header { margin-bottom: 2.5rem; }
  header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: var(--muted); margin-top: 0.25rem; font-size: 1rem; }
  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.75rem;
    margin-top: 1.5rem;
  }
  .search-row { margin-bottom: 1.25rem; }
  .search-input {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid #333;
    border-radius: 6px;
    padding: 0.55rem 0.8rem;
    font-size: 0.85rem;
    font-family: inherit;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-empty {
    color: var(--muted);
    font-size: 0.85rem;
    padding: 1.5rem 0;
    text-align: center;
  }
  .project {
    background: var(--card);
    border: 1px solid #222;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    transition: border-color 0.2s;
  }
  .project:hover { border-color: var(--accent); }
  .project .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .project .info { flex: 1; min-width: 0; }
  .project .name {
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .project .name .badge {
    font-size: 0.65rem;
    font-weight: 500;
    padding: 0.15em 0.5em;
    border-radius: 4px;
    background: var(--accent);
    color: var(--blue);
  }
  .project .desc {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }
  .project .links {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .project .links a {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.35rem 0.75rem;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .link-open {
    background: var(--green);
    color: #000;
  }
  .link-open:hover { filter: brightness(1.1); }
  .link-dir, .link-term, .link-cmd {
    cursor: pointer;
    border: none;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.35rem 0.75rem;
    border-radius: 6px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .link-dir { background: #222; color: var(--text); }
  .link-dir:hover { background: #333; }
  .link-term { background: #2d2d5e; color: var(--text); }
  .link-term:hover { background: #3d3d7e; }
  .link-cmd { background: #5e2d2d; color: var(--text); }
  .link-cmd:hover { background: #7e3d3d; }
  .link-cmd-active { background: #7e3d3d; }
  .link-gh {
    background: var(--gh);
    color: var(--text);
  }
  .link-gh:hover { background: #444; }

  .cmd-panel { border-top: 1px solid #222; padding-top: 0.75rem; }
  .cmd-panel[hidden] { display: none; }
  .cmd-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .cmd-row select,
  .cmd-row input {
    background: #222;
    color: var(--text);
    border: 1px solid #333;
    border-radius: 4px;
    padding: 0.35rem 0.5rem;
    font-size: 0.8rem;
    font-family: monospace;
  }
  .cmd-row select { flex: 0 0 auto; min-width: 150px; }
  .cmd-row input { flex: 1; min-width: 0; }
  .cmd-row button {
    background: var(--accent);
    color: var(--blue);
    border: none;
    border-radius: 4px;
    padding: 0.35rem 0.75rem;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cmd-row button:hover { filter: brightness(1.2); }
  .cmd-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  .cmd-output {
    margin-top: 0.5rem;
    background: #0a0a0a;
    border: 1px solid #222;
    border-radius: 4px;
    padding: 0.5rem;
    font-size: 0.75rem;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    color: #ccc;
  }
  .cmd-output[hidden] { display: none; }

  .host-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.3rem;
    flex-wrap: wrap;
  }
  .host-ip {
    font-size: 0.72rem;
    font-family: monospace;
    color: var(--muted);
  }
  .host-sep { color: #444; font-size: 0.72rem; }
  .port-chips { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .port-chip {
    display: inline-flex;
    align-items: center;
    padding: 0.15em 0.55em;
    border-radius: 4px;
    font-size: 0.7rem;
    font-family: monospace;
    font-weight: 600;
    background: var(--accent);
    color: var(--blue);
    text-decoration: none;
    transition: filter 0.15s;
    white-space: nowrap;
  }
  .port-chip:hover { filter: brightness(1.25); }

  /* Add / Edit app */
  .link-edit { background: #2d4a2d; color: var(--text); cursor: pointer; border: none;
    font-family: inherit; font-size: 0.8rem; font-weight: 500; padding: 0.35rem 0.75rem;
    border-radius: 6px; transition: all 0.15s; white-space: nowrap; }
  .link-edit:hover { background: #3d6a3d; }
  .link-edit-active { background: #3d6a3d; }
  .link-add { background: var(--green); color: #000; cursor: pointer; border: none;
    font-family: inherit; font-size: 0.8rem; font-weight: 600; padding: 0.35rem 0.85rem;
    border-radius: 6px; transition: filter 0.15s; white-space: nowrap; }
  .link-add:hover { filter: brightness(1.1); }

  .add-app-btn { background: var(--accent); color: var(--blue); border: 1px solid #1d4a7e;
    border-radius: 6px; padding: 0.45rem 0.9rem; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: filter 0.15s; white-space: nowrap; }
  .add-app-btn:hover { filter: brightness(1.25); }
  .add-app-btn.active { background: var(--green); color: #000; }

  .form-panel { border-top: 1px solid #222; padding-top: 0.75rem; margin-top: 0.25rem; }
  .form-panel[hidden] { display: none; }
  #manual-form-container:empty { display: none; }
  #manual-form-container .app-form {
    background: var(--card); border: 1px solid #222; border-radius: 8px;
    padding: 1rem 1.25rem; margin-bottom: 1rem;
  }
  .app-form { display: flex; flex-direction: column; gap: 0.5rem; }
  .form-row { display: flex; align-items: center; gap: 0.6rem; }
  .form-row label { flex: 0 0 90px; font-size: 0.75rem; color: var(--muted); text-align: right; }
  .form-row input, .form-row select {
    flex: 1; min-width: 0; background: #222; color: var(--text);
    border: 1px solid #333; border-radius: 4px; padding: 0.35rem 0.5rem;
    font-size: 0.8rem; font-family: inherit;
  }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--accent); }
  .form-detect { background: var(--accent); color: var(--blue); border: none; border-radius: 4px;
    padding: 0.35rem 0.7rem; font-size: 0.78rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .form-detect:hover { filter: brightness(1.2); }
  .form-note { font-size: 0.75rem; color: var(--muted); font-style: italic;
    padding: 0.25rem 0 0.25rem 96px; }
  .form-actions { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.35rem;
    padding-left: 96px; flex-wrap: wrap; }
  .form-save { background: var(--green); color: #000; border: none; border-radius: 4px;
    padding: 0.35rem 0.9rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
  .form-save:hover { filter: brightness(1.1); }
  .form-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .form-cancel { background: #222; color: var(--text); border: none; border-radius: 4px;
    padding: 0.35rem 0.9rem; font-size: 0.8rem; font-weight: 500; cursor: pointer; }
  .form-cancel:hover { background: #333; }
  .form-error { font-size: 0.78rem; color: #e74c3c; }

  .project.unclaimed { opacity: 0.72; border-style: dashed; }
  .project.unclaimed:hover { opacity: 1; border-color: var(--green); }
  .badge-unclaimed { background: #5e4a1e !important; color: #f0c674 !important; }
  .desc.mono { font-family: monospace; font-size: 0.72rem; word-break: break-all; }

  footer {
    margin-top: 3rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-green { background: var(--green); }
  .dot-red   { background: #e74c3c; }
  @media (max-width: 600px) {
    body { padding: 1rem; }
    .project .top-row { flex-direction: column; align-items: flex-start; }
    .project .links { width: 100%; flex-wrap: wrap; }
    .project .links a, .project .links button { flex: 1; justify-content: center; }
  }
</style>
</head>
<body>
<div class="container">
  <header style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;">
    <div>
      <h1>Homeslice</h1>
      <p>Local development projects</p>
    </div>
    <button id="add-app-btn" class="add-app-btn" onclick="toggleManualForm()">+ Add app</button>
  </header>

  <div class="search-row">
    <input type="text" id="search-input" class="search-input"
      placeholder="Filter by name, description, or tech... (press / to focus)"
      oninput="onSearchInput()" spellcheck="false">
  </div>

  <div id="manual-form-container"></div>

  <div id="projects"><div class="section-title">Loading…</div></div>

  <footer>
    <span id="caddy-status"><span class="dot dot-red"></span> Caddy not running</span>
    <span style="margin:0 0.5rem">|</span>
    <span id="helper-status"><span class="dot dot-red"></span> Helper not running</span>
  </footer>
</div>

<script>
const SECTION_LABELS = {
  web:     'Web Apps (behind Caddy)',
  desktop: 'Desktop Apps',
  docs:    'Docs & Planning',
};

const CMD_PRESETS = [
  { label: 'git status',    cmd: 'git status' },
  { label: 'git pull',      cmd: 'git pull' },
  { label: 'git fetch --all', cmd: 'git fetch --all' },
  { label: 'git log --oneline -5', cmd: 'git log --oneline -5' },
  { label: '(custom)',      cmd: '' },
];

function slug(name) {
  return name.toLowerCase().replace(/\s+/g, '-');
}

function htmlEscape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// Safe to splice into a single-quoted JS string literal inside an onclick="...".
function jsStringEscape(s) {
  return String(s == null ? '' : s)
    .replace(/\\/g, '\\\\').replace(/'/g, "\\'")
    .replace(/\r?\n/g, '\\n');
}

// Shared inline add/edit form. prefix gives every field a unique id; mode is
// 'add' | 'edit'; opts.pathInput adds a Directory field + Detect (manual flow).
function appFormHtml(prefix, data, mode, opts) {
  opts = opts || {};
  const d = data || {};
  const val = (v) => htmlEscape(v == null ? '' : v);
  const hasMultiPort = Array.isArray(d.ports) && d.ports.length > 1;
  const sectionOpt = (v, label) =>
    '<option value="' + v + '"' + ((d.section || 'web') === v ? ' selected' : '') + '>' + label + '</option>';

  let pathRow;
  if (opts.pathInput) {
    pathRow = '<div class="form-row"><label>Directory</label>' +
      '<input type="text" id="' + prefix + '-dir" placeholder="C:\\Apps\\my-app" spellcheck="false" value="' + val(d.dir) + '">' +
      '<button type="button" class="form-detect" onclick="detectPath(\'' + prefix + '\')">Detect</button></div>';
  } else {
    pathRow = '<input type="hidden" id="' + prefix + '-dir" value="' + val(d.dir) + '">';
  }

  const portRow = hasMultiPort
    ? '<div class="form-note">This app uses a multi-port config — edit homeslice.json directly to change ports.</div>'
    : '<div class="form-row"><label>Port</label><input type="number" id="' + prefix + '-port" placeholder="e.g. 5173" value="' + val(d.port) + '"></div>';

  return '<div class="app-form" id="' + prefix + '-form">' +
    pathRow +
    '<div class="form-row"><label>Name *</label><input type="text" id="' + prefix + '-name" spellcheck="false" value="' + val(d.name) + '"></div>' +
    '<div class="form-row"><label>Description</label><input type="text" id="' + prefix + '-description" value="' + val(d.description) + '"></div>' +
    '<div class="form-row"><label>Tech</label><input type="text" id="' + prefix + '-tech" spellcheck="false" value="' + val(d.tech) + '"></div>' +
    '<div class="form-row"><label>Section</label><select id="' + prefix + '-section">' +
      sectionOpt('web', 'Web App') + sectionOpt('desktop', 'Desktop App') + sectionOpt('docs', 'Docs & Planning') +
    '</select></div>' +
    '<div class="form-row"><label>URL</label><input type="text" id="' + prefix + '-url" spellcheck="false" value="' + val(d.url) + '"></div>' +
    portRow +
    '<div class="form-row"><label>GitHub</label><input type="text" id="' + prefix + '-github" spellcheck="false" value="' + val(d.github) + '"></div>' +
    '<div class="form-actions">' +
      '<button type="button" class="form-save" id="' + prefix + '-save" onclick="saveApp(\'' + prefix + '\',\'' + mode + '\',' + hasMultiPort + ')">Save</button>' +
      '<button type="button" class="form-cancel" onclick="cancelForm(\'' + prefix + '\')">Cancel</button>' +
      '<span class="form-error" id="' + prefix + '-error"></span>' +
    '</div>' +
  '</div>';
}

function fillForm(prefix, d) {
  const set = (f, v) => { const el = document.getElementById(prefix + '-' + f); if (el) el.value = v == null ? '' : v; };
  set('name', d.name); set('description', d.description); set('tech', d.tech);
  set('url', d.url); set('port', d.port); set('github', d.github);
  const sec = document.getElementById(prefix + '-section');
  if (sec && d.section) sec.value = d.section;
}

function detectPath(prefix) {
  const dirEl = document.getElementById(prefix + '-dir');
  const errEl = document.getElementById(prefix + '-error');
  errEl.textContent = '';
  const dir = dirEl.value.trim();
  if (!dir) { errEl.textContent = 'Enter a directory path first.'; return; }
  fetch('/detect?path=' + encodeURIComponent(dir))
    .then(r => r.json().then(j => ({ ok: r.ok, j })))
    .then(({ ok, j }) => {
      if (!ok) { errEl.textContent = j.error || 'Detection failed.'; return; }
      fillForm(prefix, j);
    })
    .catch(err => { errEl.textContent = 'Network error: ' + err.message; });
}

function saveApp(prefix, mode, hasMultiPort) {
  const get = (f) => { const el = document.getElementById(prefix + '-' + f); return el ? el.value : ''; };
  const errEl = document.getElementById(prefix + '-error');
  const saveBtn = document.getElementById(prefix + '-save');
  errEl.textContent = '';
  const dir = get('dir').trim();
  const name = get('name').trim();
  if (!dir) { errEl.textContent = 'Directory is required.'; return; }
  if (!name) { errEl.textContent = 'Name is required.'; return; }
  const body = {
    dir, name,
    description: get('description'),
    tech: get('tech'),
    section: get('section'),
    url: get('url'),
    github: get('github'),
  };
  if (!hasMultiPort) body.port = get('port');

  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }
  fetch(mode === 'edit' ? '/update-app' : '/add-app', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  })
    .then(r => r.json().then(j => ({ ok: r.ok, j })))
    .then(({ ok, j }) => {
      if (!ok) {
        errEl.textContent = j.error || 'Save failed.';
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
        return;
      }
      init(); // re-render dashboard; card now lives in its real section
    })
    .catch(err => {
      errEl.textContent = 'Network error: ' + err.message;
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
    });
}

function cancelForm(prefix) {
  if (prefix === 'manual') {
    document.getElementById('manual-form-container').innerHTML = '';
    document.getElementById('add-app-btn').classList.remove('active');
    return;
  }
  const form = document.getElementById(prefix + '-form');
  const panel = form && form.closest('.form-panel');
  if (panel) panel.setAttribute('hidden', '');
}

function togglePanel(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  if (panel.hasAttribute('hidden')) panel.removeAttribute('hidden');
  else panel.setAttribute('hidden', '');
}

function toggleManualForm() {
  const container = document.getElementById('manual-form-container');
  const btn = document.getElementById('add-app-btn');
  if (container.innerHTML) {
    container.innerHTML = '';
    btn.classList.remove('active');
  } else {
    container.innerHTML = appFormHtml('manual', { section: 'web' }, 'add', { pathInput: true });
    btn.classList.add('active');
    const dirEl = document.getElementById('manual-dir');
    if (dirEl) dirEl.focus();
  }
}

function openDir(path) {
  new Image().src = '/open-dir?path=' + encodeURIComponent(path);
}

function openTerm(path) {
  new Image().src = '/open-term?path=' + encodeURIComponent(path);
}

function toggleCmd(slug) {
  const panel = document.getElementById('cmd-panel-' + slug);
  const btn = document.getElementById('cmd-btn-' + slug);
  if (panel.hasAttribute('hidden')) {
    panel.removeAttribute('hidden');
    btn.classList.add('link-cmd-active');
  } else {
    panel.setAttribute('hidden', '');
    btn.classList.remove('link-cmd-active');
  }
}

function onPresetChange(slug) {
  const select = document.getElementById('cmd-preset-' + slug);
  if (select.value !== '') {
    document.getElementById('cmd-input-' + slug).value = '';
  }
}

function runCmd(slug, dir) {
  const output = document.getElementById('cmd-output-' + slug);
  const select = document.getElementById('cmd-preset-' + slug);
  const input = document.getElementById('cmd-input-' + slug);
  const runBtn = document.getElementById('cmd-run-' + slug);
  const cmd = select.value === '' ? input.value.trim() : select.value;
  if (!cmd) return;

  runBtn.disabled = true;
  runBtn.textContent = 'Running...';
  output.removeAttribute('hidden');
  output.textContent = '$ ' + cmd + '\n';

  fetch('/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dir, cmd }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      output.textContent += data.error + '\n';
    } else {
      if (data.stdout) output.textContent += data.stdout;
      if (data.stderr) output.textContent += (data.stdout ? '\n' : '') + data.stderr;
      if (data.timedOut) output.textContent += '\nCommand timed out';
      if (data.exitCode !== 0 && !data.timedOut) output.textContent += '\nExit code: ' + data.exitCode;
    }
    output.scrollTop = output.scrollHeight;
  })
  .catch(err => {
    output.textContent += 'Network error: ' + err.message + '\n';
  })
  .finally(() => {
    runBtn.disabled = false;
    runBtn.textContent = 'Run';
  });
}

function renderCard(p, host) {
  const hasPorts  = p.ports && p.ports.length > 0;
  const cachedStatus = _statusMap[slug(p.name)] || 'red';
  const dotHtml   = hasPorts
    ? '<span class="dot dot-' + cachedStatus + '" id="status-' + slug(p.name) + '"></span>'
    : '';
  const badgeHtml = p.tech
    ? '<span class="badge">' + htmlEscape(p.tech) + '</span>'
    : '';
  const descHtml  = p.description
    ? '<div class="desc">' + htmlEscape(p.description) + '</div>'
    : '';

  let hostRowHtml = '';
  if (hasPorts && host) {
    const chipsHtml = p.ports.map(function (pt) {
      return '<a href="http://' + htmlEscape(host.ip) + ':' + Number(pt.port) + '" class="port-chip" target="_blank">:' + Number(pt.port) + ' ' + htmlEscape(pt.label) + '</a>';
    }).join('');
    hostRowHtml = '<div class="host-row">' +
      '<span class="host-ip">' + htmlEscape(host.ip) + '</span>' +
      '<span class="host-sep">·</span>' +
      '<span class="host-ip">' + htmlEscape(host.hostname) + '</span>' +
      '<span class="host-sep">·</span>' +
      '<div class="port-chips">' + chipsHtml + '</div>' +
    '</div>';
  }

  const openHtml  = p.url
    ? '<a href="' + htmlEscape(p.url) + '" class="link-open" target="_blank">Open</a>'
    : '';
  const s = slug(p.name);
  const dirEscaped = jsStringEscape(p.dir);
  const dirHtml   = '<button class="link-dir" onclick="openDir(\'' + dirEscaped + '\')">Dir</button>';
  const termHtml  = '<button class="link-term" onclick="openTerm(\'' + dirEscaped + '\')">Term</button>';
  const cmdBtn    = '<button class="link-cmd" id="cmd-btn-' + s + '" onclick="toggleCmd(\'' + s + '\')">Cmd</button>';
  const editBtn   = '<button class="link-edit" id="edit-btn-' + s + '" onclick="togglePanel(\'edit-panel-' + s + '\')">Edit</button>';
  const ghHtml    = p.github
    ? '<a href="' + htmlEscape(p.github) + '" class="link-gh" target="_blank">GitHub</a>'
    : '';

  const editData = {
    dir: p.dir, name: p.name, description: p.description, tech: p.tech,
    section: p.section || 'web', url: p.url, port: p.port, github: p.github,
    ports: p.ports,
  };
  const editPanel = '<div class="form-panel" id="edit-panel-' + s + '" hidden>' +
    appFormHtml('edit-' + s, editData, 'edit', {}) + '</div>';

  const allPresets = p.commands && p.commands.length
    ? CMD_PRESETS.slice(0, -1).concat(p.commands).concat(CMD_PRESETS.slice(-1))
    : CMD_PRESETS;
  let presetsHtml = '';
  for (const pr of allPresets) {
    presetsHtml += '<option value="' + htmlEscape(pr.cmd) + '">' + htmlEscape(pr.label) + '</option>';
  }

  const cmdPanel = '<div class="cmd-panel" id="cmd-panel-' + s + '" hidden>' +
    '<div class="cmd-row">' +
      '<select id="cmd-preset-' + s + '" onchange="onPresetChange(\'' + s + '\')">' + presetsHtml + '</select>' +
      '<input type="text" id="cmd-input-' + s + '" placeholder="Custom command..." spellcheck="false">' +
      '<button id="cmd-run-' + s + '" onclick="runCmd(\'' + s + '\',\'' + dirEscaped + '\')">Run</button>' +
    '</div>' +
    '<pre class="cmd-output" id="cmd-output-' + s + '" hidden></pre>' +
  '</div>';

  return '<div class="project">' +
    '<div class="top-row">' +
      '<div class="info">' +
        '<div class="name">' + dotHtml + htmlEscape(p.name) + (badgeHtml ? ' ' + badgeHtml : '') + '</div>' +
        descHtml +
        hostRowHtml +
      '</div>' +
      '<div class="links">' + openHtml + termHtml + dirHtml + cmdBtn + editBtn + ghHtml + '</div>' +
    '</div>' +
    cmdPanel +
    editPanel +
  '</div>';
}

// Dimmed card for a directory with no homeslice.json yet, plus its inline Add form.
function renderUnclaimedCard(d, idx) {
  const techBadge = d.tech ? ' <span class="badge">' + htmlEscape(d.tech) + '</span>' : '';
  return '<div class="project unclaimed">' +
    '<div class="top-row">' +
      '<div class="info">' +
        '<div class="name">' + htmlEscape(d.name) + ' <span class="badge badge-unclaimed">unclaimed</span>' + techBadge + '</div>' +
        '<div class="desc mono">' + htmlEscape(d.dir) + '</div>' +
      '</div>' +
      '<div class="links"><button class="link-add" onclick="togglePanel(\'add-panel-' + idx + '\')">Add</button></div>' +
    '</div>' +
    '<div class="form-panel" id="add-panel-' + idx + '" hidden>' + appFormHtml('add-' + idx, d, 'add', {}) + '</div>' +
  '</div>';
}

function matchesQuery(p) {
  if (!_searchQuery) return true;
  const hay = [p.name, p.description, p.tech].filter(Boolean).join(' ').toLowerCase();
  return hay.includes(_searchQuery);
}

function renderProjects(projects, host, unclaimed) {
  const container = document.getElementById('projects');
  const filteredProjects = projects.filter(matchesQuery);
  const filteredUnclaimed = (unclaimed || []).filter(matchesQuery);

  const sections = {};
  for (const p of filteredProjects) {
    const s = p.section || 'web';
    (sections[s] = sections[s] || []).push(p);
  }
  const order = ['web', 'desktop', 'docs'];
  let html = '';
  for (const key of order) {
    if (!sections[key]?.length) continue;
    html += '<div class="section-title">' + (SECTION_LABELS[key] || key) + ' (' + sections[key].length + ')</div>';
    html += sections[key].map(function (p) { return renderCard(p, host); }).join('');
  }

  if (filteredUnclaimed.length) {
    html += '<div class="section-title">Not Yet Added (' + filteredUnclaimed.length + ')</div>';
    html += filteredUnclaimed.map(function (d, i) { return renderUnclaimedCard(d, i); }).join('');
  }

  if (!html) {
    html = _searchQuery
      ? '<div class="search-empty">No projects match "' + htmlEscape(_searchQuery) + '".</div>'
      : '<div class="section-title">No projects found</div>';
  }
  container.innerHTML = html;
}

function checkServices(projects) {
  for (const p of projects) {
    const primaryPort = p.ports && p.ports.length ? p.ports[0].port : p.port;
    if (!primaryPort) continue;
    const key = slug(p.name);
    fetch('http://localhost:' + primaryPort, { mode: 'no-cors', signal: AbortSignal.timeout(3000) })
      .then(function () {
        _statusMap[key] = 'green';
        const dot = document.getElementById('status-' + key);
        if (dot) dot.className = 'dot dot-green';
      })
      .catch(function () {
        _statusMap[key] = 'red';
        const dot = document.getElementById('status-' + key);
        if (dot) dot.className = 'dot dot-red';
      });
  }
}

let _projects = [];
let _host = null;
let _unclaimed = [];
let _servicesTimer = null;
let _statusMap = {};
let _searchQuery = '';

async function init() {
  const container = document.getElementById('projects');
  try {
    const [res, uRes] = await Promise.all([
      fetch('/projects'),
      fetch('/unclaimed').catch(function () { return null; }),
    ]);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    _host = data.host;
    _projects = data.projects;
    _unclaimed = [];
    if (uRes && uRes.ok) {
      try { _unclaimed = (await uRes.json()).unclaimed || []; } catch {}
    }
    renderProjects(_projects, _host, _unclaimed);
    checkServices(_projects);
    if (!_servicesTimer) _servicesTimer = setInterval(function () { checkServices(_projects); }, 30000);
  } catch (err) {
    container.innerHTML = '<div class="project"><div class="top-row"><div class="info">' +
      '<div class="name">Could not load projects</div>' +
      '<div class="desc">' + err.message + ' — is the helper server running?</div>' +
      '</div><div class="links"><button class="link-dir" onclick="init()">Retry</button></div></div></div>';
  }
}

function checkStatus() {
  const c = document.getElementById('caddy-status');
  const h = document.getElementById('helper-status');
  fetch('http://localhost', { mode: 'no-cors', signal: AbortSignal.timeout(3000) })
    .then(function () { c.innerHTML = '<span class="dot dot-green"></span> Caddy running'; })
    .catch(function () { c.innerHTML = '<span class="dot dot-red"></span> Caddy not running'; });
  fetch('/open-dir?check=1', { signal: AbortSignal.timeout(3000) })
    .then(function (r) { return r.ok
      ? (h.innerHTML = '<span class="dot dot-green"></span> Helper running')
      : Promise.reject(); })
    .catch(function () { h.innerHTML = '<span class="dot dot-red"></span> Helper not running'; });
}

function onSearchInput() {
  _searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  renderProjects(_projects, _host, _unclaimed);
}

document.addEventListener('keydown', function (e) {
  if (e.key !== '/') return;
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  e.preventDefault();
  document.getElementById('search-input').focus();
});

document.addEventListener('DOMContentLoaded', function () {
  init();
  checkStatus();
});
</script>
</body>
